# One-command demo: docker compose up -d --build
# Then open http://localhost:3001 — UI and API on the same port.
#
# restart: unless-stopped keeps the container running "all the time":
# it auto-restarts after crashes and after reboots (as long as Docker
# itself starts with the machine).
services:
  askmydocs:
    build: .
    ports:
      - '3001:3001'
    env_file: .env # provides GROQ_API_KEY and COHERE_API_KEY
    volumes:
      - ./data:/app/data # sessions survive container restarts
    restart: unless-stopped
